<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena IA - Login Corporativo</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #0f172a; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; color: #f8fafc; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 12px; border: 1px solid #334155; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; }
        h2 { margin-top: 0; color: #38bdf8; font-size: 28px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-weight: 500; color: #cbd5e1; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: #fff; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #38bdf8; outline: none; }
        .btn { background: #0284c7; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; transition: background 0.2s; }
        .btn:hover { background: #0369a1; }
        .alert { background: #1e1b4b; border: 1px solid #4338ca; padding: 10px; border-radius: 6px; font-size: 13px; color: #fbbf24; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Athena IA</h2>
        <p>Acesse o Hub de Controle dos seus Agentes</p>
        <div class="alert" id="paymentAlert">🎉 Pagamento Confirmado! Faça login abaixo para acessar sua conta Premium.</div>
        <div class="alert" style="background:#7f1d1d; border-color:#b91c1c; color:#fca5a5;" id="errorAlert"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail Corporativo</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label for="password">Senha de Acesso</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn">Entrar no Painel</button>
        </form>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('status') === 'approved' || urlParams.get('payment_success') === 'true') {
            document.getElementById('paymentAlert').style.display = 'block';
        }
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errBox = document.getElementById('errorAlert');
            errBox.style.display = 'none';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    localStorage.setItem('athena_token', data.token);
                    localStorage.setItem('user_company_id', data.userId);
                    localStorage.setItem('user_plan', data.plan);
                    if (data.isMaster) {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/dashboard-agentes.html';
                    }
                } else {
                    errBox.innerText = data.error || 'Credenciais inválidas.';
                    errBox.style.display = 'block';
                }
            } catch (err) {
                errBox.innerText = 'Erro na conexão com os servidores.';
                errBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
